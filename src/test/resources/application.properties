spring.application.name=cv-generator

# --- Test datasource: H2 in-memory ---
# Replaces the main application.properties on the test classpath.
# No Postgres required — ./mvnw test runs with no env vars set.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate generates the schema from entities; Flyway is disabled.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.h2.console.enabled=false

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- JWT (test values — ≥32 chars so JJWT accepts them) ---
jwt.secret=test-secret-key-for-junit-tests-only!!
jwt.expiry-ms=86400000

# --- Anthropic / Claude (stub mode — no key) ---
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=512
