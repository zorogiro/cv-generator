spring.application.name=cv-generator

# --- Datasource (PostgreSQL) ---
# Override any of these via environment variables before starting the app.
# Local defaults match the docker-compose.yml credentials — no env vars needed for local dev.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cvdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# --- JPA ---
# Flyway owns the schema; Hibernate only validates columns/types against the running DB.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Anthropic / Claude (set ANTHROPIC_API_KEY env var to activate the real AI features) ---
# When the env var is unset the property resolves to "" — the AI endpoints fall back to the stub.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=512
