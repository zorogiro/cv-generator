spring.application.name=cv-generator

# --- Datasource (H2 in-memory) ---
# To switch to PostgreSQL: replace these three lines with the postgres driver URL/credentials
# and add the postgresql dependency to pom.xml instead of h2
spring.datasource.url=jdbc:h2:mem:cvdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console (http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Anthropic / Claude (set ANTHROPIC_API_KEY env var to activate the real AI features) ---
# When the env var is unset the property resolves to "" — the AI endpoints fall back to the stub.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=512
